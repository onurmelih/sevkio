<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="/favicon.png" type="image/png">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<title>Sevkio — Depo</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0B1F17">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
<style>
  :root{
    --bg:#0B1F17; --surface:#122B21; --surface-2:#17362A;
    --accent:#BEF264; --accent-dim:#5c7a1f;
    --success:#34D399; --danger:#E5484D;
    --text:#F5FBF7; --muted:#8FA99C; --border:#1E3B2E;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;min-height:100vh;}
  .stripe{height:6px;background:repeating-linear-gradient(90deg,var(--accent) 0 3px,transparent 3px 6px,var(--accent-dim) 6px 8px,transparent 8px 12px);}
  header{padding:18px 20px 10px;}
  h1{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:28px;letter-spacing:0.5px;margin:0;text-transform:uppercase;}
  .eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px;}
  main{padding:0 16px 24px;max-width:480px;margin:0 auto;}

  /* Login */
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;margin-top:16px;}
  label{display:block;font-size:13px;color:var(--muted);margin:12px 0 6px;}
  input{width:100%;padding:13px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:16px;}
  input:focus{outline:2px solid var(--accent);border-color:var(--accent);}
  button{width:100%;padding:15px;border:none;border-radius:10px;font-size:16px;font-weight:600;font-family:'Inter',sans-serif;cursor:pointer;margin-top:16px;}
  .btn-primary{background:var(--accent);color:#0F2417;}
  .btn-primary:active{transform:scale(0.98);}
  .btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border);}
  .error-msg{color:var(--danger);font-size:14px;margin-top:10px;}

  /* Scanner */
  #reader{width:100%;border-radius:14px;overflow:hidden;border:2px solid var(--accent);margin-top:16px;}
  .scan-hint{text-align:center;color:var(--muted);font-size:13px;margin-top:10px;}
  .manual-toggle{text-align:center;margin-top:14px;font-size:13px;color:var(--accent);cursor:pointer;text-decoration:underline;}

  /* Result */
  .result-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px;margin-top:16px;}
  .badge{display:inline-block;font-family:'JetBrains Mono',monospace;font-size:11px;padding:4px 9px;border-radius:6px;background:var(--surface-2);color:var(--accent);letter-spacing:0.5px;text-transform:uppercase;}
  .cust{font-size:19px;font-weight:600;margin:12px 0 2px;}
  .addr{color:var(--muted);font-size:14px;}
  .divider{height:1px;background:var(--border);margin:16px 0;}
  .item-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border);}
  .item-row:last-child{border-bottom:none;}
  .item-name{font-size:14px;}
  .item-sku{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--muted);}
  .item-qty{font-family:'JetBrains Mono',monospace;font-weight:700;color:var(--accent);font-size:15px;}
  .status-ok{background:rgba(52,211,153,0.12);border:1px solid var(--success);color:var(--success);padding:14px;border-radius:10px;text-align:center;font-weight:600;margin-top:16px;}
  .status-err{background:rgba(229,72,77,0.12);border:1px solid var(--danger);color:var(--danger);padding:14px;border-radius:10px;text-align:center;font-weight:600;margin-top:16px;}
  .hidden{display:none;}
  .topbar{display:flex;justify-content:space-between;align-items:center;}
  .logout{font-size:12px;color:var(--muted);cursor:pointer;}
  .topbar-actions{display:flex;align-items:center;gap:14px;}
  .sound-toggle{cursor:pointer;font-size:20px;opacity:0.9;filter:grayscale(0%);}
  .sound-toggle.muted{opacity:0.35;filter:grayscale(100%);}
  #toastBox{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:999;display:flex;flex-direction:column;gap:8px;width:calc(100% - 32px);max-width:420px;}
  .toast{background:var(--surface);border:1px solid var(--accent);border-left:4px solid var(--accent);border-radius:10px;padding:14px 16px;font-size:14px;box-shadow:0 8px 24px rgba(0,0,0,0.35);animation:toast-in .25s ease;}
  @keyframes toast-in{from{opacity:0;transform:translateY(-10px);}to{opacity:1;transform:translateY(0);}}
  .toast b{color:var(--accent);}
</style>
</head>
<body>
  <div class="stripe"></div>
  <header>
    <div class="topbar">
      <div>
        <div class="eyebrow">depo operasyon</div>
        <img src="/logo-dark.png" alt="Sevkio" height="22" style="display:block;">
      </div>
      <div class="topbar-actions">
        <span id="soundToggle" class="sound-toggle" onclick="toggleSound()">🔔</span>
        <div id="logoutBtn" class="logout hidden">Çıkış yap</div>
      </div>
    </div>
  </header>
  <div id="toastBox"></div>

  <main>
    <!-- LOGIN -->
    <section id="loginView" class="card">
      <label>E-posta</label>
      <input id="email" type="email" value="depo@demo.com" autocomplete="username">
      <label>Şifre</label>
      <input id="password" type="password" value="123456" autocomplete="current-password">
      <button class="btn-primary" onclick="login()">Giriş yap</button>
      <div id="loginError" class="error-msg hidden"></div>
    </section>

    <!-- SCANNER -->
    <section id="scanView" class="hidden">
      <div id="reader"></div>
      <div class="scan-hint">Barkodu kamera çerçevesine getir</div>
      <div class="manual-toggle" onclick="toggleManual()">veya barkodu elle gir</div>
      <div id="manualBox" class="card hidden">
        <label>Kargo barkod numarası</label>
        <input id="manualBarcode" type="text" inputmode="numeric" placeholder="12884512...">
        <button class="btn-primary" onclick="lookupManual()">Sorgula</button>
      </div>
      <div class="manual-toggle" onclick="toggleReturnBox()" style="margin-top:8px;">İade bildir</div>
      <div id="returnBox" class="card hidden">
        <label>Ürün barkodu</label>
        <input id="ret-barcode" type="text" inputmode="numeric" placeholder="Ürün barkodunu gir">
        <button class="btn-ghost" onclick="lookupReturnProduct()">Ürünü Bul</button>
        <div id="ret-product-info" style="margin-top:10px;font-size:13px;color:var(--muted);"></div>
        <div id="ret-form-fields" class="hidden">
          <label>Adet</label>
          <input id="ret-qty" type="number" value="1" min="1">
          <label>Sebep</label>
          <input id="ret-reason" placeholder="Örn: müşteri beğenmedi, yanlış beden">
          <button class="btn-primary" style="margin-top:12px;" onclick="submitReturn()">İade Bildir (Onay Bekleyecek)</button>
        </div>
        <div id="ret-msg"></div>
      </div>
    </section>

    <!-- RESULT -->
    <section id="resultView" class="hidden">
      <div class="result-card">
        <span class="badge" id="mpBadge"></span>
        <div class="cust" id="custName"></div>
        <div class="addr" id="custAddr"></div>
        <div class="divider"></div>
        <div id="itemList"></div>
      </div>
      <button class="btn-primary" id="shipBtn" onclick="shipOrder()">Kargoya Ver ve Stok Düş</button>
      <button class="btn-ghost" onclick="printSlip()">🖨 Sevkiyat Fişi Yazdır</button>
      <button class="btn-ghost" onclick="resetScan()">Yeni barkod tara</button>
      <div id="shipResult"></div>
    </section>
  </main>

<script>
let token = null;
let currentOrderId = null;
let currentOrderData = null;
let scanner = null;

function login(){
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  fetch('/api/login', {
    method:'POST', headers:{'Content-Type':'application/json'},
    body: JSON.stringify({email, password})
  }).then(r => r.json()).then(data => {
    if(data.error){
      const el = document.getElementById('loginError');
      el.textContent = data.error; el.classList.remove('hidden');
      return;
    }
    token = data.token;
    document.getElementById('loginView').classList.add('hidden');
    document.getElementById('scanView').classList.remove('hidden');
    document.getElementById('logoutBtn').classList.remove('hidden');
    startScanner();
    checkNotifications();
  });
}

document.getElementById('logoutBtn').onclick = () => location.reload();

// ---------- Bildirimler (yeni sipariş geldiğinde sesli/görsel uyarı) ----------
let soundEnabled = localStorage.getItem('sevkio_sound_enabled') !== 'false';
updateSoundIcon();

function updateSoundIcon(){
  const el = document.getElementById('soundToggle');
  el.textContent = soundEnabled ? '🔔' : '🔕';
  el.classList.toggle('muted', !soundEnabled);
}

function toggleSound(){
  soundEnabled = !soundEnabled;
  localStorage.setItem('sevkio_sound_enabled', soundEnabled);
  updateSoundIcon();
}

function playBeep(){
  if (!soundEnabled) return;
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.15, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    osc.connect(gain); gain.connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.4);
  } catch {}
}

function showToast(text){
  const box = document.getElementById('toastBox');
  const el = document.createElement('div');
  el.className = 'toast';
  el.innerHTML = text;
  box.appendChild(el);
  setTimeout(() => el.remove(), 6000);
}

function checkNotifications(){
  if (!token) return;
  fetch('/api/notifications/unseen', { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.json()).then(list => {
      if (!Array.isArray(list) || !list.length) return;
      list.forEach(o => showToast(`<b>Yeni sipariş</b> — ${o.marketplace} · ${o.marketplace_order_no}${o.customer_name ? ' · ' + o.customer_name : ''}`));
      playBeep();
      fetch('/api/notifications/mark-seen', {
        method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
        body: JSON.stringify({ ids: list.map(o => o.id) })
      });
    }).catch(() => {});
}
setInterval(checkNotifications, 20000);

// ---------- İade Bildirme ----------
let foundReturnProduct = null;

function toggleReturnBox(){
  document.getElementById('returnBox').classList.toggle('hidden');
}

function lookupReturnProduct(){
  const barcode = document.getElementById('ret-barcode').value.trim();
  const info = document.getElementById('ret-product-info');
  fetch('/api/products/by-barcode/' + encodeURIComponent(barcode), { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.json()).then(data => {
      if (data.error) {
        info.innerHTML = `<span style="color:var(--danger);">${data.error}</span>`;
        document.getElementById('ret-form-fields').classList.add('hidden');
        foundReturnProduct = null;
        return;
      }
      foundReturnProduct = data;
      info.innerHTML = `<b style="color:var(--text);">${data.name}</b> — mevcut stok: ${data.stock}`;
      document.getElementById('ret-form-fields').classList.remove('hidden');
    });
}

function submitReturn(){
  if (!foundReturnProduct) return;
  const quantity = parseInt(document.getElementById('ret-qty').value, 10) || 1;
  const reason = document.getElementById('ret-reason').value;
  fetch('/api/returns', {
    method: 'POST', headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
    body: JSON.stringify({ productId: foundReturnProduct.id, quantity, reason })
  }).then(r => r.json()).then(data => {
    const msg = document.getElementById('ret-msg');
    if (data.error) { msg.innerHTML = `<div style="color:var(--danger);font-size:13px;margin-top:8px;">${data.error}</div>`; return; }
    msg.innerHTML = `<div style="color:var(--success);font-size:13px;margin-top:8px;">İade bildirildi, yönetici onayı bekleniyor.</div>`;
    document.getElementById('ret-barcode').value = '';
    document.getElementById('ret-reason').value = '';
    document.getElementById('ret-qty').value = 1;
    document.getElementById('ret-form-fields').classList.add('hidden');
    document.getElementById('ret-product-info').innerHTML = '';
    foundReturnProduct = null;
  });
}

function startScanner(){
  scanner = new Html5Qrcode("reader");
  scanner.start(
    { facingMode: "environment" },
    { fps: 10, qrbox: { width: 260, height: 140 } },
    (decodedText) => { scanner.pause(); lookupBarcode(decodedText); },
    () => {}
  ).catch(err => {
    document.getElementById('reader').innerHTML =
      '<div style="padding:20px;color:var(--muted);text-align:center;font-size:13px;">Kameraya erişilemedi. Tarayıcı izinlerini kontrol et veya barkodu elle gir.</div>';
  });
}

function toggleManual(){ document.getElementById('manualBox').classList.toggle('hidden'); }
function lookupManual(){ lookupBarcode(document.getElementById('manualBarcode').value.trim()); }

function lookupBarcode(barcode){
  fetch('/api/scan/' + encodeURIComponent(barcode), { headers: { Authorization: 'Bearer ' + token } })
    .then(r => r.json()).then(data => {
      if(data.error){ alert(data.error); if(scanner) scanner.resume(); return; }
      showResult(data);
    });
}

function showResult(data){
  document.getElementById('scanView').classList.add('hidden');
  document.getElementById('resultView').classList.remove('hidden');
  currentOrderId = data.order.id;
  currentOrderData = data;
  document.getElementById('mpBadge').textContent = data.order.marketplace + ' · ' + data.order.marketplace_order_no;
  document.getElementById('custName').textContent = data.order.customer_name || '—';
  document.getElementById('custAddr').textContent = data.order.customer_address || '';
  const list = document.getElementById('itemList');
  list.innerHTML = '';
  data.items.forEach(it => {
    list.innerHTML += `<div class="item-row">
      <div><div class="item-name">${it.name}</div><div class="item-sku">${it.sku} · stok: ${it.stock}</div></div>
      <div class="item-qty">×${it.quantity}</div>
    </div>`;
  });
  document.getElementById('shipResult').innerHTML = '';
  document.getElementById('shipBtn').classList.remove('hidden');
  document.getElementById('shipBtn').disabled = false;
  document.getElementById('shipBtn').textContent = 'Kargoya Ver ve Stok Düş';
}

// Not: Bu resmi bir e-Fatura/e-Arşiv belgesi DEĞİLDİR — sadece depo içi, gayriresmi bir
// sevkiyat/paketleme fişidir. Resmi fatura için muhasebeci/e-Fatura entegrasyonu gerekiyor.
function printSlip(){
  if (!currentOrderData) return;
  const { order, items } = currentOrderData;
  const itemRows = items.map(it => `
    <tr><td>${it.name}</td><td>${it.sku}</td><td style="text-align:right;">${it.quantity}</td></tr>
  `).join('');
  const win = window.open('', '_blank', 'width=420,height=600');
  win.document.write(`
    <html><head><title>Sevkiyat Fişi — ${order.marketplace_order_no}</title>
    <style>
      body{font-family:Arial,sans-serif;padding:24px;color:#111;}
      h1{font-size:18px;margin:0 0 4px;}
      .muted{color:#666;font-size:12px;}
      table{width:100%;border-collapse:collapse;margin-top:16px;}
      th,td{border-bottom:1px solid #ddd;padding:8px 4px;text-align:left;font-size:13px;}
      .foot{margin-top:20px;font-size:11px;color:#999;}
    </style></head><body>
      <h1>Sevkiyat Fişi</h1>
      <div class="muted">${order.marketplace} · ${order.marketplace_order_no} · ${order.cargo_barcode}</div>
      <div class="muted">Bu belge resmi fatura değildir, sadece depo içi paketleme fişidir.</div>
      <p><b>${order.customer_name || ''}</b><br>${order.customer_address || ''}</p>
      <table>
        <thead><tr><th>Ürün</th><th>SKU</th><th style="text-align:right;">Adet</th></tr></thead>
        <tbody>${itemRows}</tbody>
      </table>
      <div class="foot">Sevkio ile oluşturuldu — ${new Date().toLocaleString('tr-TR')}</div>
      <script>window.print();<\/script>
    </body></html>
  `);
  win.document.close();
}

function shipOrder(){
  document.getElementById('shipBtn').disabled = true;
  document.getElementById('shipBtn').textContent = 'İşleniyor...';
  fetch('/api/orders/' + currentOrderId + '/ship', {
    method:'POST', headers:{ Authorization: 'Bearer ' + token }
  }).then(r => r.json()).then(data => {
    const box = document.getElementById('shipResult');
    if(data.error){
      box.innerHTML = `<div class="status-err">${data.error}</div>`;
      document.getElementById('shipBtn').disabled = false;
      document.getElementById('shipBtn').textContent = 'Kargoya Ver ve Stok Düş';
      return;
    }
    box.innerHTML = `<div class="status-ok">Kargoya verildi. Stok ${data.marketplacesUpdated} pazaryerinde güncellendi.</div>`;
    document.getElementById('shipBtn').classList.add('hidden');
  });
}

function resetScan(){
  document.getElementById('resultView').classList.add('hidden');
  document.getElementById('scanView').classList.remove('hidden');
  document.getElementById('manualBarcode').value = '';
  if(scanner){ scanner.resume(); } else { startScanner(); }
}

if('serviceWorker' in navigator){
  navigator.serviceWorker.register('/sw.js').catch(()=>{});
}
</script>
</body>
</html>
